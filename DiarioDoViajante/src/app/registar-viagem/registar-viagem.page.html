<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-button routerLink="/registoviagem">
        <ion-icon slot="icon-only" name="arrow-back"></ion-icon>
      </ion-button>
    </ion-buttons>
    <ion-title style="color: #ffffff; text-align: center; width: 100%; font-size: 18px;">
      Registar Viagem
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

<ion-item class="custom-input" lines="none">
  <ion-input [(ngModel)]="destino" placeholder="Destino" type="text">
    <ion-icon slot="start" name="location"></ion-icon>
  </ion-input>
</ion-item>

<ion-item class="custom-input" lines="none">
  <ion-input [(ngModel)]="percurso" placeholder="Percurso" type="text">
    <ion-icon slot="start" name="map"></ion-icon>
  </ion-input>
</ion-item>

<ion-item class="custom-input" lines="none">
  <ion-input [(ngModel)]="preco" placeholder="Preço" type="number">
    <ion-icon slot="start" name="cash"></ion-icon>
  </ion-input>
</ion-item>

<ion-item class="custom-input" lines="none">
  <ion-select [(ngModel)]="transporte" placeholder="Transporte">
    <ion-select-option value="carro">Carro</ion-select-option>
    <ion-select-option value="comboio">Comboio</ion-select-option>
    <ion-select-option value="autocarro">Autocarro</ion-select-option>
    <ion-select-option value="avião">Avião</ion-select-option>
  </ion-select>
  <ion-icon slot="start" name="bus"></ion-icon>
</ion-item>

  <ion-button expand="block" class="confirmar-button">
    Confirmar
  </ion-button>

</ion-content>

<ion-footer>
  <ion-toolbar class="custom-tab-bar">
    <ion-grid>
      <ion-row class="ion-align-items-center">
        <ion-col class="ion-text-start">
          <ion-button fill="clear" routerLink="/dashboard" routerLinkActive="tab-selected" [routerLinkActiveOptions]="{ exact: true }">
            <ion-icon slot="icon-only" name="home"></ion-icon>
          </ion-button>
        </ion-col>
        <ion-col class="ion-text-center">
          <ion-button fill="clear" routerLink="/perfil" routerLinkActive="tab-selected">
            <ion-icon slot="icon-only" name="person"></ion-icon>
          </ion-button>
        </ion-col>
        <ion-col class="ion-text-end">
          <ion-button fill="clear" routerLink="/settings" routerLinkActive="tab-selected">
            <ion-icon slot="icon-only" name="settings"></ion-icon>
          </ion-button>
        </ion-col>
      </ion-row>
    </ion-grid>
  </ion-toolbar>
</ion-footer>
