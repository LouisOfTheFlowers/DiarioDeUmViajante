<ion-header>
  <ion-toolbar>
    <ion-title>{{ 'PERFIL.TITLE' | translate }}</ion-title>
    <ion-buttons slot="end">
      <ion-button color="danger" routerLink="/home">
        <ion-icon slot="icon-only" name="power"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <div class="profile-banner">
    <div class="banner-title">{{ 'PERFIL.TITLE' | translate }}</div>
  </div>

  <ion-item lines="none" class="user-item">
    <ion-icon slot="start" name="person-outline"></ion-icon>
    <ion-label>{{ username }}</ion-label>
  </ion-item>

  <div class="button-grid">
    <ion-button expand="block" fill="solid" color="light" routerLink="/registar-viagem" class="icon-button">
      <ion-icon slot="start" name="create-outline"></ion-icon>
      {{ 'PERFIL.REGISTRO_VIAGENS' | translate }}
    </ion-button>

    <ion-button expand="block" fill="solid" color="light" routerLink="/historico-viagem" class="icon-button">
      <ion-icon slot="start" name="refresh-outline"></ion-icon>
      {{ 'PERFIL.HISTORICO_VIAGENS' | translate }}
    </ion-button>

    <ion-button expand="block" fill="solid" color="light" routerLink="/avaliacoes" class="icon-button">
      <ion-icon slot="start" name="star-outline"></ion-icon>
      {{ 'PERFIL.AVALIACOES' | translate }}
    </ion-button>

    <ion-button expand="block" fill="solid" color="light" routerLink="/fotografias" class="icon-button">
      <ion-icon slot="start" name="camera-outline"></ion-icon>
      {{ 'PERFIL.FOTOGRAFIAS' | translate }}
    </ion-button>
  </div>
</ion-content>

<ion-footer>
  <ion-toolbar class="custom-tab-bar">
    <ion-grid>
      <ion-row class="ion-align-items-center">
        <ion-col class="ion-text-start">
          <ion-button fill="clear" routerLink="/dashboard" routerLinkActive="tab-selected" [routerLinkActiveOptions]="{ exact: true }">
            <ion-icon slot="icon-only" name="home"></ion-icon>
          </ion-button>
        </ion-col>
        <ion-col class="ion-text-center">
          <ion-button fill="clear" routerLink="/perfil" routerLinkActive="tab-selected">
            <ion-icon slot="icon-only" name="person"></ion-icon>
          </ion-button>
        </ion-col>
        <ion-col class="ion-text-end">
          <ion-button fill="clear" routerLink="/settings" routerLinkActive="tab-selected">
            <ion-icon slot="icon-only" name="settings"></ion-icon>
          </ion-button>
        </ion-col>
      </ion-row>
    </ion-grid>
  </ion-toolbar>
</ion-footer>
