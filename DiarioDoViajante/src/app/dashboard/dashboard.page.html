<ion-header>
  <ion-toolbar>
    <ion-title>{{ 'DASHBOARD.TITLE' | translate }}</ion-title>
    <ion-buttons slot="end">
      <ion-button color="danger" routerLink="/home">
        <ion-icon slot="icon-only" name="power"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-searchbar
    [(ngModel)]="searchTerm"
    placeholder="{{ 'DASHBOARD.SEARCH_PLACEHOLDER' | translate }}"
    showClearButton="always">
  </ion-searchbar>

  <ng-container *ngFor="let destino of destinos | filterDestinos:searchTerm">
    <ion-card>
      <ion-card-header>
        <ion-card-title style="font-size: 1.2em;">{{ destino.titulo | translate }}</ion-card-title>
      </ion-card-header>
      <ion-card-content>
        <ion-grid>
          <ion-row>
            <ion-col size="4" style="display: flex; align-items: center;">
              <img [src]="destino.imagem" [alt]="destino.titulo" style="width: 100%; border-radius: 8px;">
            </ion-col>
            <ion-col size="8">
              <p style="font-size: 0.95em;">{{ destino.descricao | translate }}</p>
              <ion-button size="small" color="medium" (click)="abrirWikipedia(destino.wikipedia)">
                {{ 'DASHBOARD.MORE_INFO' | translate }}
              </ion-button>
            </ion-col>
          </ion-row>
        </ion-grid>
      </ion-card-content>
    </ion-card>
  </ng-container>
</ion-content>

<ion-footer>
  <ion-toolbar class="custom-tab-bar">
    <ion-grid>
      <ion-row class="ion-align-items-center">
        <ion-col class="ion-text-start">
          <ion-button fill="clear" routerLink="/dashboard" routerLinkActive="tab-selected" [routerLinkActiveOptions]="{ exact: true }">
            <ion-icon slot="icon-only" name="home"></ion-icon>
          </ion-button>
        </ion-col>
        <ion-col class="ion-text-center">
          <ion-button fill="clear" routerLink="/perfil" routerLinkActive="tab-selected">
            <ion-icon slot="icon-only" name="person"></ion-icon>
          </ion-button>
        </ion-col>
        <ion-col class="ion-text-end">
          <ion-button fill="clear" routerLink="/settings" routerLinkActive="tab-selected">
            <ion-icon slot="icon-only" name="settings"></ion-icon>
          </ion-button>
        </ion-col>
      </ion-row>
    </ion-grid>
  </ion-toolbar>
</ion-footer>
