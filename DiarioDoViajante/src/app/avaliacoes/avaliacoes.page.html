<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Avaliações</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="openFilter()">
        <ion-icon slot="icon-only" name="options-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="ion-padding">

  <!-- Banner/Header image with overlay text -->
  <div style="position: relative; margin-bottom: 24px;">
    <img src="/assets/banner1.webp" alt="Avaliações" style="width: 100%; border-radius: 24px; height: 90px; object-fit: cover;">
    <div style="position: absolute; left: 24px; bottom: 16px; color: #111; font-size: 2em; font-weight: 600; text-shadow: 0 2px 8px #fff;">
      Avaliações
    </div>
  </div>

  <!-- Avaliação Restaurante -->
  <!-- ...existing code... -->

<!-- Avaliação Restaurante -->
<!-- Avaliação Restaurante -->
<ion-card *ngIf="filter === 'all' || filter === 'restaurante'" style="background: transparent;">
  <ion-grid>
    <ion-row>
      <ion-col size="4" style="display: flex; align-items: center;">
        <img src="assets/restaurante.png" alt="Restaurante" style="width: 100%; border-radius: 8px;">
      </ion-col>
      <ion-col size="8">
        <div style="font-size: 1.1em; font-weight: 500;">Restaurante</div>
        <div style="margin-top: 8px;">
          <ng-container *ngFor="let star of [1,2,3,4,5]; let i = index">
            <ion-icon
              [name]="restauranteRating >= star ? 'star' : 'star-outline'"
              style="font-size: 2em; color: #111; cursor: pointer;"
              (click)="setRestauranteRating(star)">
            </ion-icon>
          </ng-container>
        </div>
      </ion-col>
    </ion-row>
  </ion-grid>
</ion-card>

<!-- Avaliação Hotel -->
<ion-card *ngIf="filter === 'all' || filter === 'hotel'" style="background: transparent;">
  <ion-grid>
    <ion-row>
      <ion-col size="4" style="display: flex; align-items: center;">
        <img src="assets/hotel.png" alt="Hotel" style="width: 100%; border-radius: 8px;">
      </ion-col>
      <ion-col size="8">
        <div style="font-size: 1.1em; font-weight: 500;">Hotel</div>
        <div style="margin-top: 8px;">
          <ng-container *ngFor="let star of [1,2,3,4,5]; let i = index">
            <ion-icon
              [name]="hotelRating >= star ? 'star' : 'star-outline'"
              style="font-size: 2em; color: #111; cursor: pointer;"
              (click)="setHotelRating(star)">
            </ion-icon>
          </ng-container>
        </div>
      </ion-col>
    </ion-row>
  </ion-grid>
</ion-card>
<!-- ...existing code... -->

</ion-content>

<ion-footer>
  <ion-toolbar class="custom-tab-bar">
    <ion-grid>
      <ion-row class="ion-align-items-center">
        <ion-col class="ion-text-start">
          <ion-button fill="clear" routerLink="/dashboard" routerLinkActive="tab-selected" [routerLinkActiveOptions]="{ exact: true }">
            <ion-icon slot="icon-only" name="home"></ion-icon>
          </ion-button>
        </ion-col>
        <ion-col class="ion-text-center">
          <ion-button fill="clear" routerLink="/perfil" routerLinkActive="tab-selected">
            <ion-icon slot="icon-only" name="person"></ion-icon>
          </ion-button>
        </ion-col>
        <ion-col class="ion-text-end">
          <ion-button fill="clear" routerLink="/settings" routerLinkActive="tab-selected">
            <ion-icon slot="icon-only" name="settings"></ion-icon>
          </ion-button>
        </ion-col>
      </ion-row>
    </ion-grid>
  </ion-toolbar>
</ion-footer>
