<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-button routerLink="/perfil">
        <ion-icon slot="icon-only" name="arrow-back"></ion-icon>
      </ion-button>
    </ion-buttons>
    <ion-title>Avaliações</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="openFilter()">
        <ion-icon slot="icon-only" name="options-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="ion-padding">
  <div style="position: relative; margin-bottom: 24px;">
    <img src="/assets/banner1.webp" alt="Avaliações" style="width: 100%; border-radius: 24px; height: 90px; object-fit: cover;">
    <div style="position: absolute; left: 24px; bottom: 16px; color: #111; font-size: 2em; font-weight: 600; text-shadow: 0 2px 8px #fff;">
      Avaliações
    </div>
  </div>

  <ion-searchbar
    [(ngModel)]="searchTerm"
    placeholder="Procurar restaurante/hotel..."
    showClearButton="always">
  </ion-searchbar>

  <div *ngIf="avaliacoes.length === 0" class="empty-state" style="text-align: center; margin-top: 40px;">
    <img src="assets/images/sadface.png" alt="Sem avaliações" style="width: 120px; margin-bottom: 16px;" />
    <p style="font-size: 1.1em; color: #444;">De momento não tem avaliações registadas</p>
  </div>

  <div *ngIf="avaliacoesFiltradas.length > 0">
    <ion-card *ngFor="let avaliacao of avaliacoesFiltradas; let i = index" style="margin-bottom: 18px;">
      <ion-card-header>
        <ion-card-title style="font-size: 1.2em;">{{ avaliacao.nome }}</ion-card-title>
        <ion-card-subtitle>{{ avaliacao.categoria }}</ion-card-subtitle>
      </ion-card-header>
      <ion-card-content>
        <p>{{ avaliacao.comentario }}</p>
        <div>
          <ion-icon *ngFor="let star of [1,2,3,4,5]"
                    [name]="avaliacao.rating >= star ? 'star' : 'star-outline'"
                    style="color: #FFD600;"></ion-icon>
        </div>
        <div *ngIf="avaliacao.foto" style="text-align:center; margin: 12px 0;">
          <img [src]="avaliacao.foto" alt="Foto" style="max-width: 180px; border-radius: 12px;" />
        </div>
        <div style="display: flex; gap: 12px; margin-top: 12px;">
          <ion-button color="danger" (click)="eliminarAvaliacao(i)">
            <ion-icon slot="icon-only" name="trash-outline" style="font-size: 1.5em;"></ion-icon>
          </ion-button>
        </div>
      </ion-card-content>
    </ion-card>
  </div>
</ion-content>

<ion-fab vertical="bottom" horizontal="end" slot="fixed" style="margin-bottom: 70px;">
  <ion-fab-button routerLink="/registar-avaliacao">
    <ion-icon name="add"></ion-icon>
  </ion-fab-button>
</ion-fab>

<ion-footer>
  <ion-toolbar class="custom-tab-bar">
    <ion-grid>
      <ion-row class="ion-align-items-center">
        <ion-col class="ion-text-start">
          <ion-button fill="clear" routerLink="/dashboard" routerLinkActive="tab-selected" [routerLinkActiveOptions]="{ exact: true }">
            <ion-icon slot="icon-only" name="home"></ion-icon>
          </ion-button>
        </ion-col>
        <ion-col class="ion-text-center">
          <ion-button fill="clear" routerLink="/perfil" routerLinkActive="tab-selected">
            <ion-icon slot="icon-only" name="person"></ion-icon>
          </ion-button>
        </ion-col>
        <ion-col class="ion-text-end">
          <ion-button fill="clear" routerLink="/settings" routerLinkActive="tab-selected">
            <ion-icon slot="icon-only" name="settings"></ion-icon>
          </ion-button>
        </ion-col>
      </ion-row>
    </ion-grid>
  </ion-toolbar>
</ion-footer>
